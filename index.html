    { id: 'p126', q: '「人と仲良くやっていく」を英語で？', choices: ['get along without people', 'get along with people', 'get over people', 'get along to people'], correct: 1,
      explain: 'get along with ~ = 〜と仲良くやっていく。"She gets along well with her coworkers."（彼女は同僚とうまくやっている）。without（〜なしで）と with（〜と）で意味が真逆。' },
    { id: 'p127', q: '「〜の困ったところは…」を英語で？', choices: ['The trouble of ~ is...', 'The trouble with ~ is...', 'The trouble for ~ is...', 'The trouble to ~ is...'], correct: 1,
      explain: 'The trouble with ~ is... = 〜の困ったところは…。"The trouble with this plan is that it costs too much."（この計画の難点はお金がかかりすぎることだ）。前置詞は with。' },
    { id: 'p128', q: '「わがままを抑えないと、振り回されるよ」を英語で？', choices: ['Master selfishness or it will master you', 'Master selfishness and it masters you', 'Be master selfishness or master you', 'Master to selfishness or it master you'], correct: 0,
      explain: '命令文 + or + 主語 will ~ = 〜しろ、さもないと…するぞ。"Hurry up or you\'ll be late."（急がないと遅刻するよ）。master = 支配する・使いこなす。' },
    { id: 'p129', q: '「フィリピンでは（その商品を）売っていない」を英語で？', choices: ['they sold out in the Philippines', "they don't sell them in the Philippines", 'they are not sell in the Philippines', "they don't selling in the Philippines"], correct: 1,
      explain: 'they don\'t sell them = （店が）それを売っていない。sold out は「売り切れ」で、そもそも扱いがない時は don\'t sell が正しい。"They don\'t sell that brand here."（その銘柄はここでは売っていない）。' },
    { id: 'p130', q: '「お土産を買った方がいい」を英語で？', choices: ['I should buy a souvenir', 'I should buy some souvenirs', 'I should buy souvenir', 'I should buy the souvenir'], correct: 1,
      explain: 'should buy some souvenirs = お土産を（いくつか）買った方がいい。souvenir は数えられる名詞。複数買うなら some souvenirs。"I should buy some snacks."（おやつを買っておこう）。' },
    { id: 'p131', q: '「ちょっと探してみよう」を英語で？', choices: ["I'll try to find them a little", "I'll try finding them a little", "I'll try to looking for them", "I try find them"], correct: 0,
      explain: 'try to + 動詞 = 〜しようとする。look for / find = 探す。"I\'ll try to find a good restaurant."（いいレストランを探してみる）。a little で「ちょっと」を添える。' },
    { id: 'p132', q: '「体に合わない（食べ物が）」を英語で？', choices: ["the food doesn't fit my body", "the food doesn't agree with me", "the food doesn't suit to me", "the food isn't good my body"], correct: 1,
      explain: 'the food doesn\'t agree with me = その食べ物が体に合わない（食べると調子が悪くなる）。"Spicy food doesn\'t agree with me."（辛い物は体に合わない）。簡単には "makes me sick" も使える。' },
    { id: 'p133', q: '「全部がそうとは限らない」を英語で？', choices: ['All of them are not', 'Not all of them', 'Not all them', 'All not of them'], correct: 1,
      explain: 'Not all of them ~ = それら全部が〜なわけではない（一部は違う）。"Not all of them are dangerous."（全部が危険なわけではない）。部分否定の便利な表現。' },
    { id: 'p134', q: '「体に悪い」を中学レベルで簡単に言うと？', choices: ['bad against the body', 'bad for the body', 'bad to the body', 'bad with the body'], correct: 1,
      explain: 'bad for ~ = 〜に悪い。"Too much sugar is bad for your teeth."（砂糖の取りすぎは歯に悪い）。反対は good for ~（〜に良い）。前置詞は for。' },
    { id: 'p135', q: '「最新のパックを買った」を英語で？', choices: ['I bought the new packs', 'I bought the newest packs', 'I bought the most new packs', 'I bought new packs'], correct: 1,
      explain: 'the newest = 最新の（new の最上級 + the）。"I got the newest iPhone."（最新のiPhoneを買った）。new だと「新しい」止まりで「最新」のニュアンスは弱い。' },
    { id: 'p136', q: '「（店に）置いてなかった」を英語で？', choices: ['it was nothing', "they didn't have one", 'there was not', 'it did not exist'], correct: 1,
      explain: "they didn't have one = （店に）置いてなかった。one = 欲しかった商品。\"I wanted the red one, but they didn't have it.\"（赤いのが欲しかったけど、なかった）。it was nothing は「大したことない」で全く別の意味。" },
    { id: 'p137', q: '「ライチュウのぬいぐるみ」を英語で？', choices: ["a Raichu's stuffed toy", 'a Raichu stuffed toy', 'a stuffed toy of Raichu', 'a Raichu of stuffed toy'], correct: 1,
      explain: 'a Raichu stuffed toy = ライチュウのぬいぐるみ。名詞を並べて表す（アポストロフィ s は不要）。"a Pikachu keychain"（ピカチュウのキーホルダー）も同じ作り方。' },
    { id: 'p138', q: '「たくさん用事を済ませた」を自然に言うと？', choices: ['I finished a lot of plans', 'I got a lot of things done', 'I did a lot of plans', 'I ended many things'], correct: 1,
      explain: 'get things done = 用事を片付ける・物事を済ませる。"I got a lot done today."（今日はたくさん片付けた）。finish plans は不自然。get + 物 + done の形を覚えると便利。' },
    { id: 'p139', q: '「（選考のある）仕事に応募した」を英語で？', choices: ['I applied the job', 'I applied for the job', 'I applied to the job', 'I signed up the job'], correct: 1,
      explain: 'apply for ~ = 〜に応募する（選考がある）。"She applied for a scholarship."（彼女は奨学金に応募した）。誰でも登録できるものは sign up for（sign up for a class 授業に登録する）。' },
    { id: 'p140', q: '「1日で全部終わらせた」を英語で？', choices: ['on a day', 'in one day', 'at one day', 'for one day'], correct: 1,
      explain: 'in one day = 1日で（かかった時間）。"I read the whole book in one day."（1日で本を読み切った）。in は「〜という時間の中で」。on a day とは言わない。' },
    { id: 'p141', q: '「各キャラクターに愛着を持つ」を自然に言うと？', choices: ['have an attachment with each character', 'feel attached to each character', 'feel attachment with each character', 'be attach to each character'], correct: 1,
      explain: 'feel attached to ~ = 〜に愛着を持つ。"Players feel attached to each character."（プレイヤーは各キャラに愛着を持つ）。"have an attachment with" は不自然。attached は「くっついた」→気持ちがくっついている＝愛着があるイメージ。' },
    { id: 'p142', q: '「そのプロジェクトの一員になれて嬉しい」を自然に言うと？', choices: ['glad to join it', 'happy to be part of it', 'happy to join in it', 'glad to be a part'], correct: 1,
      explain: "be part of ~ = 〜の一員である。'I'm happy to be part of it.'（その一員になれて嬉しい）。join も間違いではないが、「参加している状態」を表すには be part of が自然。" },
    { id: 'p143', q: '「9時ごろ家に着く」を自然に言うと？', choices: ['the time I arrive at home is 9', 'I get home around 9 pm', 'I arrive to home about 9', 'I reach home in 9 pm'], correct: 1,
      explain: "get home = 家に着く（home は副詞なので to は不要）。around 9 pm = 9時ごろ。'I get home around 9 pm.'が自然。'the time I arrive at home is 21 o clock' のような言い方や24時間表記は日常会話では不自然。" },
    { id: 'p144', q: '「必要なものを持っていく」を自然に言うと？', choices: ['bring something to need', 'bring the things I need', 'bring the need things', 'bring things to needing'], correct: 1,
      explain: "the things I need = 私が必要なもの（関係代名詞that省略）。'I'll bring the things I need to the office.'（必要なものを会社に持っていく）。'something to need' は文法的におかしい表現なので注意。" },
    { id: 'p145', q: '「作るのが面倒だ」を自然に言うと？', choices: ["It's hassled to make", "It's a pain to make", "It's trouble to make", "It's annoyed to make"], correct: 1,
      explain: "It's a pain to ~ = 〜するのが面倒だ（口語でよく使う）。pain は「痛み」だが、a pain で「面倒なこと・厄介なこと」を表す。'It's a pain to make design documents.'（仕様書を作るのは面倒だ）。hassled や annoyed は人の気持ちを表す語なので、この形では不自然。" },
    { id: 'p146', q: '「大変な授業を乗り切った」を自然に言うと？', choices: ['I got over the class', 'I got through the class', 'I got off the class', 'I got out the class'], correct: 1,
      explain: "get through ~ = （大変な期間・仕事）を最後までやり切る。'I got through the tough group class.'（大変なグループ授業を乗り切った）。get over ~ は「（病気・失恋など）から立ち直る」で意味が違う。" },
    { id: 'p147', q: '「最近（このごろ）〜している」と今の習慣を言うときに自然なのは？', choices: ['Recently, I enjoy ~', 'These days, I enjoy ~', 'Now days, I enjoy ~', 'In recent, I enjoy ~'], correct: 1,
      explain: "These days = 最近、このごろ（今も続いている習慣に使う）。'These days, I enjoy watching streams.'（最近は配信を見るのが楽しい）。Recently は完了形（have done）と使うことが多く、今の習慣には These days が自然。" },
    { id: 'p148', q: '「（ゲームで）マスターボールのランクに到達した」を自然に言うと？', choices: ['I achieved the rank', 'I reached the rank', 'I arrived the rank', 'I got up the rank'], correct: 1,
      explain: "reach ~ = （ある段階・ランク）に到達する。'I reached the Master Ball rank.'（マスターボールのランクに到達した）。achieve は「目標を達成する」で使えるが、ランクには reach が自然。arrive は場所に着くときで、後ろに at が必要。" },
    { id: 'p149', q: '日記で「みんなに感謝している」と書くとき自然なのは？', choices: ['I appreciate it', "I'm thankful to them", 'I thank them', 'I have thanks'], correct: 1,
      explain: "be thankful to 人 = 〜に感謝している（気持ちを表す）。'I'm thankful to them.'（みんなに感謝している）。I appreciate it. は相手に直接「ありがとう」と言うときの表現なので、日記で第三者への感謝を書くには不自然。" },
    { id: 'p150', q: '「仕事で（職場で）」を表す自然な言い方は？', choices: ['on my work', 'at work', 'in my work', 'to work'], correct: 1,
      explain: "at work = 仕事中に、職場で（冠詞なしの決まった言い方）。'I finished a task at work.'（仕事で作業を終えた）。on my work とは言わない。at school（学校で）、at home（家で）と同じ形。" },
    { id: 'p151', q: '「これからは（今後は）忙しくなる」の「これからは」は？', choices: ['from now', 'from now on', 'after now', 'since now'], correct: 1,
      explain: "from now on = これから先ずっと、今後は。'I'll be busy from now on.'（これからは忙しくなる）。on を付け忘れやすいので注意。" },
    { id: 'p152', q: '「（だんだん）好きになった」を自然に言うと？', choices: ['I got loving it', 'I came to love it', 'I became loving it', 'I turned to love it'], correct: 1,
      explain: "come to + 動詞の原形 = （だんだん）〜するようになる（気持ちの変化）。'I came to love all the Pokémon.'（ポケモンが全部好きになった）。got loving や became loving は文法的に誤り。" },
    { id: 'p153', q: '「長い間それを見ていない」の「長い間」は？', choices: ['for long while', 'for a long while', 'in a long while', 'during long while'], correct: 1,
      explain: "for a long while = 長い間（while は可算名詞なので a が必要）。'I haven't watched it for a long while.'（長い間それを見ていない）。for a long time も同じ意味でよく使う。" }
  ],
  grammar: [
    { id: 'g01', q: '正しいのはどれ？', choices: ['the todays lesson', "the today's lesson", "today's lesson", 'today lesson'], correct: 2,
      explain: '所有格（\'s）と the は同時に使えません。"Let\'s check today\'s news."（今日のニュースをチェックしよう）。my book に the my book と言わないのと同じ。' },
    { id: 'g02', q: '「先生はいい人でした」の正しい文は？', choices: ['The teacher is good person.', 'The teacher was good person.', 'The teacher was a good person.', "The teacher's a good person."], correct: 2,
      explain: 'person は数えられる名詞なので a が必要。過去なので was。"He was a kind man."（彼は優しい男性だった）。' },
    { id: 'g03', q: '「いつ英語を学び始めましたか？」の正しい文は？', choices: ['When did you started learning English?', 'When did you start learning English?', 'When you started learning English?', 'When do you started learning English?'], correct: 1,
      explain: 'did を使ったら動詞は原形（start）に。"When did you arrive?"（いつ着いたの？）。中学英語の重要ルール。' },
    { id: 'g04', q: '「Politics ___ difficult.」に入るのは？', choices: ['are', 'is', 'were', 'be'], correct: 1,
      explain: '-ics で終わる学問名は単数扱い。"Mathematics is my favorite subject."（数学は私の好きな科目）。economics, physics も同様。' },
    { id: 'g05', q: "次の文の間違いは？「I enjoyed today's lesson. The teacher is a good person.」", choices: ['enjoyed が間違い', 'is が間違い（was にする）', "today's が間違い", '間違いはない'], correct: 1,
      explain: '前の文が過去形 enjoyed なら、後の文も過去形 was に揃える。"I went to the park. It was beautiful."（公園に行った。きれいだった）。時制の一致。' },
    { id: 'g06', q: "「I'm looking forward ___ you.」に入るのは？", choices: ['to see', 'to seeing', 'see', 'seeing'], correct: 1,
      explain: 'looking forward to の to は前置詞なので、後ろは動名詞（〜ing）。"I\'m looking forward to hearing from you."（あなたからの返事を楽しみにしてます）。' },
    { id: 'g07', q: '「明日は最終日です」の正しい文は？', choices: ['Tomorrow is last day.', 'Tomorrow is a last day.', 'Tomorrow is the last day.', 'Tomorrow is my the last day.'], correct: 2,
      explain: '世界に1つしかないものには the。"Today is the first day of summer."（今日は夏の最初の日）。the last / the first / the best など順序・最上級に the。' },
    { id: 'g08', q: '「クーラーを使い始めた」の正しい文は？', choices: ['I started use the air conditioner.', 'I started on the air conditioner.', 'I started using the air conditioner.', 'I started to using the air conditioner.'], correct: 2,
      explain: 'start + 動名詞 / to + 原形。"She started running every morning."（彼女は毎朝走り始めた）。会話では ~ing がより自然。' },
    { id: 'g09', q: "「It's ___ hot to sleep.」（暑すぎて眠れない）に入るのは？", choices: ['so', 'too', 'very', 'such'], correct: 1,
      explain: 'too は「〜すぎる（困る）」。"too ... to ~"（〜すぎて…できない）の形。"This coffee is too hot to drink."（このコーヒーは熱すぎて飲めない）。' },
    { id: 'g10', q: '「ジーンズを1本買った」の正しい文は？', choices: ['I bought a jeans.', 'I bought jeans.', 'I bought a pair of jeans.', 'I bought a piece of jeans.'], correct: 2,
      explain: 'jeans, pants, glasses, scissors など2つの部分でできるものは a pair of で数える。"I need a new pair of glasses."（新しいメガネがいる）。' },
    { id: 'g11', q: '一番自然な英文はどれ？', choices: ["I enjoyed to do today's lesson.", "I enjoyed do today's lesson.", "I enjoyed doing today's lesson.", "I enjoyed today's lesson."], correct: 3,
      explain: 'enjoy の目的語は名詞か動名詞。"I enjoyed the movie."（映画を楽しんだ）が一番自然。do a lesson は不自然。' },
    { id: 'g12', q: '「Thank you ___ having me.」に入るのは？', choices: ['to', 'of', 'for', 'about'], correct: 2,
      explain: 'Thank you for ~ing = 〜してくれてありがとう。"Thank you for helping me."（助けてくれてありがとう）。for の後は動名詞または名詞。' },
    { id: 'g13', q: '「7月に」を英語で？', choices: ['at July', 'on July', 'in July', 'to July'], correct: 2,
      explain: '月の前は in。at（時刻 at 7）、on（日付 on Monday）、in（月・年・季節 in spring, in 2026）。"She was born in October."' },
    { id: 'g14', q: '「フィリピンに行く」の正しい文は？', choices: ['I go to Philippines', 'I go to the Philippines', 'I go to a Philippines', 'I go Philippines'], correct: 1,
      explain: 'the Philippines は必ず the が必要。複数形の国名には the。"I\'d like to visit the Netherlands someday."（いつかオランダに行きたい）。' },
    { id: 'g15', q: '「商談準備を終えた」の正しい文は？', choices: ['I finished to prepare for the meeting', 'I finished preparing for the meeting', 'I finished prepare for the meeting', 'I finished to preparing for the meeting'], correct: 1,
      explain: 'finish + 動名詞。"Have you finished writing the report?"（レポート書き終わった？）。enjoy, stop, give up も同じパターン。' },
    { id: 'g16', q: '「次のパーティーを楽しみにしてる」の正しい文は？', choices: ['I look forward to enjoy the next party', "I'm looking forward to the next party", 'I look forward enjoy the next party', "I'm looking forward enjoy the next party"], correct: 1,
      explain: 'look forward to の to は前置詞なので、後ろは名詞か動名詞。"I\'m looking forward to the weekend."（週末が楽しみ）。' },
    { id: 'g17', q: '「この髪型でフィリピンに行く」の「この髪型で」は？', choices: ['on this hairstyle', 'in this hairstyle', 'with this hairstyle', 'by this hairstyle'], correct: 2,
      explain: 'with this hairstyle = この髪型で。with は「〜を身につけて」。"The girl with the red hat is my sister."（赤い帽子の女の子が私の妹）。' },
    { id: 'g18', q: '「英語を話すことへの緊張が少し減った」の正しい文は？', choices: ['I feel a little less nervous about speaking English', 'I feel a little less nervous to speak English', 'I feel little less nervous about speaking English', 'I feel a less nervous about speaking English'], correct: 0,
      explain: 'less + 形容詞 = より〜でない。"I feel less tired today."（今日は疲れが少ない）。nervous about の後は ~ing。' },
    { id: 'g19', q: '「Unity Editor を操作できる uLoop」を関係代名詞で説明するなら？', choices: ['uLoop that control Unity Editor', 'uLoop, which lets you control Unity Editor', 'uLoop which control Unity Editor', 'uLoop that lets control Unity Editor'], correct: 1,
      explain: 'コンマ + which は補足説明。"My laptop, which I bought last year, is broken."（去年買ったノートパソコンが壊れた）。' },
    { id: 'g20', q: '「うまくいきますように」を hope を使って言うと？', choices: ['I hope go well', 'I hope it goes well', 'I hope it go well', 'I hope to go well'], correct: 1,
      explain: 'I hope の後は「主語 + 動詞」。三単現の s も忘れずに。"I hope she likes my gift."（彼女がプレゼントを気に入るといいな）。' },
    { id: 'g21', q: '「明日が最終日」の正しい文は？', choices: ['Tomorrow is last day', 'Tomorrow is a last day', 'Tomorrow is the last day', 'Tomorrow is one last day'], correct: 2,
      explain: 'the last day = 最後の日（世界に1つしかないので the）。"This is the best pizza I\'ve ever had."（人生最高のピザだ）。' },
    { id: 'g22', q: '「Tomorrow」のスペル、正しいのは？', choices: ['Tommorow', 'Tommrow', 'Tomorrow', 'Tomorow'], correct: 2,
      explain: 'Tomorrow = to + morrow。m は1つ、r は2つ。よく間違える単語ベスト10入り！丁寧に覚えよう。' },
    { id: 'g23', q: '「テストで点数を取る」の前置詞は？', choices: ['at the test', 'in the test', 'on the test', 'for the test'], correct: 2,
      explain: 'on the test = テストで。on は接触のコア。"He got 95 on his history test."（彼は歴史のテストで95点取った）。' },
    { id: 'g24', q: '「My English is getting ___ little by little.」に入るのは？', choices: ['well', 'good', 'better', 'best'], correct: 2,
      explain: 'better = より良く（比較級）。get + 比較級 = だんだん〜になる。"The days are getting longer."（日がだんだん長くなっている）。' },
    { id: 'g25', q: "「I'm thinking ___ studying abroad.」（留学を考え中）の前置詞は？", choices: ['to', 'of', 'for', 'about'], correct: 1,
      explain: 'I\'m thinking of ~ing = 〜しようかなと考え中。"I\'m thinking of buying a new bike."（新しい自転車を買おうかと考え中）。' },
    { id: 'g26', q: '「毎日出社する」の「毎日」、正しいのは？', choices: ['everyday', 'every day', 'all day', 'each days'], correct: 1,
      explain: 'every day（2語）= 毎日（副詞）。everyday（1語）= 日常の〜（形容詞、everyday life など）。"I drink water every day."' },
    { id: 'g27', q: '「留学の準備をする」の正しい形は？', choices: ['prepare studying abroad', 'prepare for studying abroad', 'prepare to study abroad', 'prepare for と to の両方OK'], correct: 3,
      explain: 'prepare for + 名詞/動名詞、prepare to + 動詞。"She\'s preparing for her exam."（試験準備）/ "She\'s preparing to leave."（出発準備）。' },
    { id: 'g28', q: '「でも英語の復習もしなきゃ」の also の正しい位置は？', choices: ['But also I have to review', 'But I also have to review', 'But I have also to review', 'But I have to also review'], correct: 1,
      explain: 'also は「主語 + also + 動詞」が基本。"I also like coffee."（私もコーヒーが好き）。be動詞や助動詞の前に置きます。' },
    { id: 'g29', q: '「何が起きても諦めない」の正しい文は？', choices: ["Whatever I don't give up", "Whatever happens, I won't give up", "Whatever happen, I won't give up", "Whatever, I don't give up"], correct: 1,
      explain: 'Whatever + 主語 + 動詞 の型。"Whatever you decide, I\'ll support you."（あなたが何を決めても応援する）。カンマも忘れずに。' },
    { id: 'g30', q: '「ソルジャーボーイに戦ってほしかった（実際は戦わなかった）」を英語で？', choices: ['I wanted to fight with Soldier Boy', 'I wish Soldier Boy had joined the fight', 'I hope Soldier Boy fights', 'I wanted Soldier Boy fight'], correct: 1,
      explain: 'wish + 過去完了 = 過去の事実に反する願望。"I wish I had studied harder in school."（学校でもっと勉強すればよかった）。' },
    { id: 'g31', q: '「給料を60万円に上げてもらった」の正しい表現は？', choices: ['They increased it for 600,000 yen', 'They raised it to 600,000 yen', 'They raised it for 600,000 yen', 'They up it to 600,000 yen'], correct: 1,
      explain: 'raise it to ~ = 〜に上げる（to は到達点）。"The shop raised the price to 5,000 yen."（店は値段を5,000円に上げた）。' },
    { id: 'g32', q: '「映画の最後のシーン」を英語で？', choices: ['the scene of the end', 'the scene at the end', 'the scene in the end', 'the scene to the end'], correct: 1,
      explain: 'at the end = 終わりの地点で。"We met at the end of the street."（通りの突き当たりで会った）。at は特定の地点。' },
    { id: 'g33', q: '「最後まで・ずっと」を英語で？', choices: ['until the end', 'all the way to the end', 'どちらも正しいが all the way の方が勢いがある', 'to the end'], correct: 2,
      explain: 'all the way to the end = 最後の最後まで（勢いがある）。"He ran all the way home."（家までずっと走った）。' },
    { id: 'g34', q: '「見終わった」を英語で？', choices: ['I watched it', 'I finished watching it', 'I ended watching it', 'I done watch it'], correct: 1,
      explain: 'finish watching = 見終わる。finish の後は動名詞。"Have you finished reading the book?"（本読み終わった？）。' },
    { id: 'g35', q: '「期間（3年間）続いた」の正しい時制と動詞は？', choices: ['continues three years', 'lasted for three years', 'last three years', 'is lasted three years'], correct: 1,
      explain: 'lasted for ~ = 期間続いた（過去形）。前置詞 for とセット。"Our trip lasted for two weeks."（旅行は2週間続いた）。' },
    { id: 'g36', q: '「セブに到着した」の正しい前置詞は？', choices: ['I arrived at Cebu', 'I arrived in Cebu', 'I arrived to Cebu', 'I arrived on Cebu'], correct: 1,
      explain: 'arrive in + 広い場所、arrive at + 狭い地点。"They arrived in Tokyo last night."（昨晩東京に到着）/ "He arrived at the station."（駅に到着）。' },
    { id: 'g37', q: '「長ズボン買えばよかった！」（後悔）を英語で？', choices: ['I want to buy long pants', 'I should have bought long pants', 'I will buy long pants', 'I bought long pants'], correct: 1,
      explain: 'should have + 過去分詞 = 〜すべきだった（後悔）。"I should have brought an umbrella."（傘を持ってくればよかった）。' },
    { id: 'g38', q: '「the bathroom may not ___」（バスルームがきれいじゃないかも）の正しい形は？', choices: ['clean', 'be clean', 'cleaning', 'cleans'], correct: 1,
      explain: 'clean は形容詞なので、助動詞の後に be が必要。"The food may not be fresh."（食べ物は新鮮じゃないかも）。形容詞の前には be 動詞。' },
    { id: 'g39', q: '「私のもの」を表すのに自然なのは？', choices: ['I got textbooks', 'I got my textbooks', 'I got the textbooks', 'I got textbook'], correct: 1,
      explain: '自分のものには my をつけると自然。"I lost my keys."（鍵をなくした）。所有を明確にすると自然な英文に。' },
    { id: 'g40', q: '同じ単語を繰り返さない時、a + 名詞 の代わりに使うのは？', choices: ['it', 'one', 'that', 'the'], correct: 1,
      explain: 'one = 前に出た「a + 名詞」の代わり。"I lost my pen. I need to buy one."（ペンをなくした。1本買わなきゃ）。it だと「その特定のペン」になってしまう。' },
    { id: 'g41', q: '「先生は知らない人と話すなと注意した」の正しい文は？', choices: ["The teacher warned us to don't talk to strangers", 'The teacher warned us not to talk to strangers', 'The teacher said us not talk to strangers', 'The teacher warned us no talking to strangers'], correct: 1,
      explain: 'warn 人 not to do = 〜しないよう注意する。"The doctor warned him not to eat too much sugar."（医者は彼に砂糖を取りすぎないよう注意した）。' },
    { id: 'g42', q: '「あの映画はこわかった（映画が原因）」を英語で？', choices: ['That movie was scared', 'That movie was frightened', 'That movie was frightening', 'That movie was fear'], correct: 2,
      explain: '物事が人をこわがらせる時は -ing。"That movie was so frightening!"（あの映画こわかった！＝こわがらせるものだった）。-ed は人の気持ち（I was frightened）。' },
    { id: 'g43', q: '「手段（〜することによって）」と「目的（〜するために）」の正しい使い分けは？', choices: ['どちらも to + 動詞', '手段は by + ~ing、目的は to + 動詞', 'どちらも by + ~ing', '手段は for + 名詞、目的は ~ing'], correct: 1,
      explain: 'by + ~ing = 手段（〜することによって）。to + 動詞 = 目的（〜するために）。"I lost weight by exercising."（運動で痩せた）vs "I exercise to lose weight."（痩せるために運動する）。' },
    { id: 'g44', q: '「100回上げることができた」の正しい文は？', choices: ['I lifted it hundred times', 'I lifted it a hundred times', 'I lifted it the hundred times', 'I lifted it one hundred time'], correct: 1,
      explain: 'a hundred times = 100回（hundred の前に a が必要）。同じパターン：a thousand（千）、a million（百万）。"He has read it a hundred times."（彼はそれを100回読んだ）。' },
    { id: 'g45', q: '「（一回の達成として）〜することができた」の自然な言い方は？', choices: ['I could lift the dumbbell', 'I was able to lift the dumbbell', 'I can lifted the dumbbell', 'I could to lift the dumbbell'], correct: 1,
      explain: '一回の達成 = was able to。could だと「能力があった（一般的）」になりがち。"I was able to finish the report on time."（時間通りにレポートを終えられた）。' },
    { id: 'g46', q: '「彼は寝ているに違いない」の正しい文は？', choices: ['He must be sleeping', 'He must sleeping', 'He must to sleep', 'He must slept'], correct: 0,
      explain: '助動詞（must, can, will, could など）のあとは必ず動詞の原形。be + sleeping で「寝ている」。"You must be tired."（疲れているに違いない）。 ★ゆうきの伸びしろポイント！' },
    { id: 'g47', q: '「used to + 動詞」と「get used to + 名詞/~ing」の違いは？', choices: ['同じ意味', 'used to = 昔の習慣（今はしてない）、get used to = 〜に慣れる', 'used to = 慣れる、get used to = 昔の習慣', 'どちらも「使う」'], correct: 1,
      explain: 'used to + 動詞 = 昔は〜だった（今はしてない）。get used to + 名詞/~ing = 〜に慣れる。"I used to live in Tokyo."（昔は東京に住んでた）vs "I got used to living in Cebu."（セブでの生活に慣れた）。' },
    { id: 'g48', q: '「友達が私に教えてくれた」自然な英文は？', choices: ['I was taught my friend', 'I was taught by my friend', 'A friend taught me', 'どちらも自然だが A friend taught me がより自然'], correct: 3,
      explain: '日本語の受動的な表現を、英語では能動態で言う方が自然。"A friend taught me how to use the gym machines."（友達がジム機材の使い方を教えてくれた）。' },
    { id: 'g49', q: '「会議はそれぞれ約1時間でした」の正しい文は？', choices: ["It's about one hour", 'They were about an hour each', 'They are about one hour', 'They were one hour'], correct: 1,
      explain: '過去なので were、複数なので They、それぞれを表す each、会話では an hour が one hour より自然。"The lessons were about an hour each."（レッスンはそれぞれ約1時間だった）。' },
    { id: 'g50', q: '「ここに駐車してはいけない」（禁止）の正しい表現は？', choices: ["You can't park here", 'You must not park here', 'どちらも禁止を表せる', "You don't park here"], correct: 2,
      explain: '禁止は must not（強い）も can\'t（やわらかい）もOK。"You can\'t take photos here."（写真撮影禁止）。ただし「彼が来るはずがない」のような強い否定の推量は can\'t（must not は使わない）。' },
    { id: 'g51', q: '「他のもう1つのモール」の正しい表現は？', choices: ['other mall', 'another mall', 'the other mall', 'other malls'], correct: 1,
      explain: 'another = もう一つ別の（単数）。other は単独で単数名詞につけられない。"another cup of coffee"（もう1杯）vs "other people"（他の人々／複数）。' },
    { id: 'g52', q: '「日本と同じ雰囲気」を英語で？', choices: ['same as Japan', 'same as in Japan', 'the same as in Japan', 'same with Japan'], correct: 2,
      explain: 'same は the same が基本。「日本（の中）と同じ」は in が必要。"The food here is the same as in my hometown."（ここの食べ物は地元と同じ）。' },
    { id: 'g53', q: '「月曜日に」の前置詞は？', choices: ['at Monday', 'on Monday', 'in Monday', 'for Monday'], correct: 1,
      explain: '曜日は on。"See you on Monday."（月曜日に会おう）。前置詞ルール：at（時刻 at 7）→ on（日・曜日 on Monday）→ in（月・年・季節 in July）と範囲が広がる。' },
    { id: 'g54', q: '「カードを1枚も買えなかった」の正しい文は？', choices: ["I didn't buy cards", "I couldn't buy any cards", "I couldn't buy some cards", "I didn't buy any card"], correct: 1,
      explain: 'couldn\'t = 買えなかった（買いたかったけど無理だった）、any = 否定文で「1つも」、cards = 複数。"I couldn\'t find any errors."（エラーが1つも見つからなかった）。' },
    { id: 'g55', q: '「a bit of」の後ろに来る名詞は？', choices: ['複数形のみ', '不可算名詞', '可算名詞のみ', '何でもいい'], correct: 1,
      explain: 'a bit of + 不可算名詞 = 少しの〜。"a bit of water/help/time/sugar"。可算名詞の複数形には a few を使い分け（a few books）。' },
    { id: 'g56', q: "「I'm a bit of ___ open book.」の空欄に入るのは？", choices: ['a', 'an', 'the', 'なし'], correct: 1,
      explain: '母音の発音で始まる単語の前は an。open は母音始まりなので an。"an apple"（リンゴ）、"an hour"（h が無音）も同じパターン。' },
    { id: 'g57', q: '「速く走る」の「速く」、正しいのは？', choices: ['fastly', 'fast', 'fastly または fast', 'fasty'], correct: 1,
      explain: 'fast は形容詞も副詞も同じ形（fastly という単語は存在しない！）。"He runs fast."（彼は速く走る）。同じパターン：hard（熱心に）、early（早く）、late（遅く）。' },
    { id: 'g58', q: '「泳ぎに行く」の正しい文は？', choices: ['I go to swim', 'I go swim', 'I go swimming', 'I go for swimming'], correct: 2,
      explain: 'go + ~ing = 〜しに行く。"I go swimming every weekend."（毎週末泳ぎに行く）。go fishing, go shopping, go hiking なども同じ形。' },
    { id: 'g59', q: '「迷子を探す」の正しい文は？', choices: ['search a lost child', 'search for a lost child', 'search to a lost child', 'search about a lost child'], correct: 1,
      explain: 'search for + 探す対象。"The police searched for the missing man."（警察は行方不明の男性を探した）。search a place（場所を捜索する）と search for（探す対象）を区別。' },
    { id: 'g60', q: '「窓を開けてもらえますか？」の正しい文は？', choices: ['Do you mind to open the window?', 'Do you mind opening the window?', 'Do you mind open the window?', 'Do you mind to opening the window?'], correct: 1,
      explain: 'mind + 動名詞（~ing）。"Would you mind closing the door?"（ドアを閉めてもらえますか？）。mind, enjoy, finish, give up, avoid は動名詞をとる動詞。' },
    { id: 'g61', q: '「海・川・海洋」に the をつける？つけない？', choices: ['the the Pacific Ocean のように the が必要', 'the は不要', 'どちらでもいい', 'a をつける'], correct: 0,
      explain: '自然の海・川・海洋には the が必要。the Pacific Ocean（太平洋）、the Nile（ナイル川）。一方、Lake Biwa（琵琶湖）、Mount Fuji（富士山）のように「種類＋名前」の形は the 不要。' },
    { id: 'g62', q: '「Mount Fuji（富士山）」に the は必要？', choices: ['the Mount Fuji が正しい', 'the は不要（Mount Fuji のまま）', 'a Mount Fuji', 'どちらでもいい'], correct: 1,
      explain: 'Mount/Lake/Central などの「種類を表す語＋名前」には the が不要。Mount Fuji, Lake Biwa, Central Park, Tokyo Station。一方 the Pacific Ocean（海洋）は the が必要。' },
    { id: 'g63', q: '「（証拠から）〜だったはずがない」推量の過去の否定は？', choices: ['must not have been', "couldn't have been", 'may not have been', 'should not have been'], correct: 1,
      explain: 'couldn\'t have + 過去分詞 = 〜だったはずがない（過去の強い否定推量）。"He couldn\'t have stolen it; he was with me."（彼が盗んだはずがない、僕と一緒にいたから）。might not have は「〜しなかったかも」と弱い。' },
    { id: 'g64', q: '「風邪をひいたので休んだ」の正しい文は？', choices: ['I have a cold so I take a day off', 'I caught a cold, so I took a day off', 'I catch a cold so I took a day off', 'I had a cold so I take a day off'], correct: 1,
      explain: '日記は過去形に統一。「風邪をひく」は catch a cold（過去 caught）。「休みを取る」take a day off（過去 took）。"I caught a cold yesterday."（昨日風邪をひいた）。' },
    { id: 'g65', q: '「来週」に前置詞は必要？', choices: ['in next week', 'on next week', 'next week（前置詞なし）', 'at next week'], correct: 2,
      explain: 'next / last / this がつくと前置詞は不要。"I\'ll move next week."（来週引っ越す）。"See you next Monday."（また来週月曜）。in next week とは言いません。' },
    { id: 'g66', q: '「授業に行く」の正しい形は？', choices: ['go to the class', 'go to class', 'go class', 'go in class'], correct: 1,
      explain: 'go to class = 授業に行く（class は「授業」の意味では a も the もつけない）。go to school, go to work も同じパターン（無冠詞）。"I go to class every day."' },
    { id: 'g67', q: '「despite」の後ろに来るのは？', choices: ['文（主語＋動詞）', '名詞または動名詞（~ing）', 'to + 動詞', '形容詞'], correct: 1,
      explain: 'despite / in spite of + 名詞・動名詞 = 〜にもかかわらず。"Despite the rain, we went out."（雨にもかかわらず出かけた）。一方 although は後ろに文がくる（although it rained）。' },
    { id: 'g68', q: '「雨だったけど出かけた」を although で言うと？', choices: ['Although the rain, we went out', 'Although it rained, we went out', 'Although raining, we went out', 'Although of rain, we went out'], correct: 1,
      explain: 'although + 文（主語＋動詞）。"Although it rained, we went out."（雨が降ったけど出かけた）。despite は名詞をとる（despite the rain）ので使い分けに注意。' },
    { id: 'g69', q: '「将来は」の前置詞、正しいのは？', choices: ['for the future', 'in the future', 'on the future', 'at the future'], correct: 1,
      explain: 'in the future = 将来は。"I want to live in the US in the future."（将来アメリカに住みたい）。for the future は「将来のために（備え）」と意味が変わります。' },
    { id: 'g70', q: '「might be able to」と「might have to」の違いは？', choices: ['同じ意味', 'might be able to = できるかも、might have to = しなければならないかも', '逆の意味で同じ', 'どちらも「したい」'], correct: 1,
      explain: 'might be able to = できるかも（可能性）。might have to = しなければならないかも（義務）。"I might be able to join."（参加できるかも）vs "I might have to work."（働かなきゃかも）。助動詞は重ねられないので be able to / have to を使う。' },
    { id: 'g71', q: '「薬を飲む」の正しい動詞は？', choices: ['drink medicine', 'take medicine', 'eat medicine', 'have medicine'], correct: 1,
      explain: 'take medicine = 薬を飲む（drink は使わない！）。"Take this medicine twice a day."（この薬を1日2回飲んで）。錠剤も液体も take。' },

const TOTAL = QUESTIONS.vocab.length + QUESTIONS.phrase.length + QUESTIONS.grammar.length;
document.getElementById('total-badge').textContent = TOTAL + '問';

const MASTERY_THRESHOLD = 3;

let state = { mode: null, questions: [], idx: 0, score: 0, answered: false, picked: -1, history: [] };
let stats = { played: 0, best: 0, totalCorrect: 0 };
let mastery = {}; // {id: streak}

function loadData() {
  try {
    const s = localStorage.getItem('eng-quiz-stats');
    if (s) stats = JSON.parse(s);
  } catch (e) {}
  try {
    const m = localStorage.getItem('eng-quiz-mastery');
    if (m) mastery = JSON.parse(m);
  } catch (e) {}
}

function saveStats() {
  try { localStorage.setItem('eng-quiz-stats', JSON.stringify(stats)); } catch (e) {}
}
function saveMastery() {
  try { localStorage.setItem('eng-quiz-mastery', JSON.stringify(mastery)); } catch (e) {}
}

function resetMastery() {
  if (confirm('マスター記録（連続正解の進捗）をリセットしますか？\nスコア記録は残ります。')) {
    mastery = {};
    saveMastery();
    render();
  }
}

// 記録をコード化（デバイス間共有用）
function makeSyncCode() {
  const data = { v: 1, mastery, stats };
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function applySyncCode(code) {
  try {
    const data = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if (!data || (!data.mastery && !data.stats)) throw new Error('invalid');
    let importedMastered = 0, currentMastered = 0;
    const allIds = [...QUESTIONS.vocab, ...QUESTIONS.phrase, ...QUESTIONS.grammar].map(q => q.id);
    if (data.mastery) {
      allIds.forEach(id => { if ((data.mastery[id]||0) >= MASTERY_THRESHOLD) importedMastered++; });
      allIds.forEach(id => { if ((mastery[id]||0) >= MASTERY_THRESHOLD) currentMastered++; });
    }
    const msg = `読み込むと、今の記録は上書きされます。\n\n読み込むコードのマスター数: ${importedMastered}問\n今の端末のマスター数: ${currentMastered}問\n\n続けますか？`;
    if (!confirm(msg)) return;
    if (data.mastery) { mastery = data.mastery; saveMastery(); }
    if (data.stats) { stats = data.stats; saveStats(); }
    state.mode = null;
    render();
    alert('記録を読み込みました！🎉');
  } catch (e) {
    alert('コードが正しくないようです。コード全体をコピーできているか確認してください。');
  }
}

function openSync() { state.mode = 'sync'; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function getStreak(id) { return mastery[id] || 0; }
function isMastered(id) { return getStreak(id) >= MASTERY_THRESHOLD; }

function getAvailable(category) {
  if (category === 'mix') {
    return [...QUESTIONS.vocab, ...QUESTIONS.phrase, ...QUESTIONS.grammar].filter(q => !isMastered(q.id));
  }
  return QUESTIONS[category].filter(q => !isMastered(q.id));
}

function getMasteryStats() {
  const all = [...QUESTIONS.vocab, ...QUESTIONS.phrase, ...QUESTIONS.grammar];
  const mastered = all.filter(q => isMastered(q.id)).length;
  return { mastered, total: all.length, pct: Math.round(mastered / all.length * 100) };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 出題のたびに選択肢をシャッフルし、正解位置をばらけさせる
// 「どちらも〜」のような他の選択肢を参照するメタ選択肢は最後に固定する
function shuffleChoices(q) {
  const correctText = q.choices[q.correct];
  const metaPattern = /どちらも|両方|いずれも/;
  const movable = q.choices.filter(c => !metaPattern.test(c));
  const fixed = q.choices.filter(c => metaPattern.test(c));
  const newChoices = [...shuffle(movable), ...fixed];
  return { ...q, choices: newChoices, correct: newChoices.indexOf(correctText) };
}

function startMode(mode) {
  const available = getAvailable(mode);
  if (available.length === 0) {
    alert('このカテゴリは全問マスター済みです！🎉\nマスター記録をリセットすると再挑戦できます。');
    return;
  }
  const limit = mode === 'mix' ? 15 : 10;
  const qs = shuffle(available).slice(0, Math.min(limit, available.length)).map(shuffleChoices);
  state = { mode, questions: qs, idx: 0, score: 0, answered: false, picked: -1, history: [] };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pick(i) {
  if (state.answered) return;
  state.answered = true;
  state.picked = i;
  const q = state.questions[state.idx];
  const ok = i === q.correct;
  if (ok) state.score++;
  
  // Update mastery
  const prevStreak = getStreak(q.id);
  const newStreak = ok ? prevStreak + 1 : 0;
  mastery[q.id] = newStreak;
  saveMastery();
  
  state.history.push({
    q: q.q, picked: q.choices[i], correct: q.choices[q.correct], ok, explain: q.explain,
    prevStreak, newStreak, justMastered: ok && newStreak === MASTERY_THRESHOLD
  });
  render();
  if (navigator.vibrate) navigator.vibrate(ok ? 20 : [10, 30, 10]);
}

function next() {
  state.idx++;
  state.answered = false;
  state.picked = -1;
  if (state.idx >= state.questions.length) {
    stats.played++;
    stats.totalCorrect += state.score;
    const pct = Math.round(state.score / state.questions.length * 100);
    if (pct > stats.best) stats.best = pct;
    saveStats();
  }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  state.mode = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render() {
  const r = document.getElementById('root');
  if (state.mode === 'sync') r.innerHTML = renderSync();
  else if (state.mode === null) r.innerHTML = renderHome();
  else if (state.idx >= state.questions.length) r.innerHTML = renderResult();
  else r.innerHTML = renderQuestion();
  attach();
}

function renderSync() {
  const code = makeSyncCode();
  const m = getMasteryStats();
  return `
    <p class="title" style="font-size:18px;font-weight:600;margin:0 0 4px;">🔄 デバイス間で記録を同期</p>
    <p class="subtitle">スマホとPCなど、別の端末に記録を移すための画面です。自動同期はできないので、コードをコピーして手動で移します。</p>

    <div style="margin-bottom:20px;">
      <p style="font-size:14px;font-weight:600;margin:0 0 6px;">① この端末の記録を書き出す</p>
      <p style="font-size:12px;color:#a8a59c;margin:0 0 8px;">下のコードを全部コピーして、もう一方の端末の「読み込む」欄に貼り付けてください。（現在マスター ${m.mastered}問）</p>
      <textarea id="exportArea" readonly style="width:100%;height:90px;background:#232321;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#d4d2c9;font-size:11px;padding:10px;font-family:monospace;resize:none;box-sizing:border-box;">${code}</textarea>
      <button class="btn" id="copyBtn" style="margin-top:8px;">📋 コードをコピー</button>
    </div>

    <div style="margin-bottom:12px;">
      <p style="font-size:14px;font-weight:600;margin:0 0 6px;">② 別の端末の記録を読み込む</p>
      <p style="font-size:12px;color:#a8a59c;margin:0 0 8px;">もう一方の端末でコピーしたコードを下に貼り付けてください。貼り付けると自動で確認が出ます（出ない時は下のボタンを押してね）。</p>
      <textarea id="importArea" placeholder="ここにコードを貼り付け..." style="width:100%;height:90px;background:#232321;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f0eee7;font-size:11px;padding:10px;font-family:monospace;resize:none;box-sizing:border-box;"></textarea>
      <button class="btn btn-primary" id="importBtn" style="margin-top:8px;">📥 この記録を読み込む</button>
    </div>

    <button class="btn" id="homeBtn" style="margin-top:8px;">ホームに戻る</button>
  `;
}

function renderHome() {
  const m = getMasteryStats();
  const remaining = {
    vocab: getAvailable('vocab').length,
    phrase: getAvailable('phrase').length,
    grammar: getAvailable('grammar').length,
    mix: getAvailable('mix').length
  };
  
  return `
    <p class="subtitle">3回連続正解した問題はマスター済みとして出題されません。何度も繰り返して全問マスターを目指そう！</p>
    <div class="mode-grid">
      <button class="mode-btn" data-mode="vocab" ${remaining.vocab === 0 ? 'disabled' : ''}>
        <div class="mode-icon">📖</div>
        <div class="mode-name">単語</div>
        <div class="mode-count">${remaining.vocab > 0 ? `残り${remaining.vocab}問 / 全${QUESTIONS.vocab.length}問` : '全問マスター済み'}</div>
      </button>
      <button class="mode-btn" data-mode="phrase" ${remaining.phrase === 0 ? 'disabled' : ''}>
        <div class="mode-icon">💬</div>
        <div class="mode-name">フレーズ</div>
        <div class="mode-count">${remaining.phrase > 0 ? `残り${remaining.phrase}問 / 全${QUESTIONS.phrase.length}問` : '全問マスター済み'}</div>
      </button>
      <button class="mode-btn" data-mode="grammar" ${remaining.grammar === 0 ? 'disabled' : ''}>
        <div class="mode-icon">✏️</div>
        <div class="mode-name">文法</div>
        <div class="mode-count">${remaining.grammar > 0 ? `残り${remaining.grammar}問 / 全${QUESTIONS.grammar.length}問` : '全問マスター済み'}</div>
      </button>
      <button class="mode-btn" data-mode="mix" ${remaining.mix === 0 ? 'disabled' : ''}>
        <div class="mode-icon">✨</div>
        <div class="mode-name">ミックス</div>
        <div class="mode-count">${remaining.mix > 0 ? '15問' : '全問マスター済み'}</div>
      </button>
    </div>
    
    <div class="mastery-bar">
      <div class="mastery-row">
        <span class="mastery-label">🏆 マスター進捗</span>
        <span class="mastery-value">${m.mastered} / ${m.total} 問 (${m.pct}%)</span>
      </div>
      <div class="mastery-progress"><div class="mastery-fill" style="width: ${m.pct}%"></div></div>
      <div class="mastery-hint">3回連続正解で「マスター」扱いになり、出題されなくなります。</div>
      <button class="reset-btn" id="resetBtn">マスター記録をリセット</button>
    </div>

    <button class="btn" id="syncBtn" style="margin-top:12px;">🔄 デバイス間で記録を同期</button>
    
    <div class="stats" style="margin-top: 12px;">
      <div class="stat">
        <div class="stat-num">${stats.played}</div>
        <div class="stat-lbl">プレイ回数</div>
      </div>
      <div class="stat">
        <div class="stat-num">${stats.best}%</div>
        <div class="stat-lbl">ベスト</div>
      </div>
      <div class="stat">
        <div class="stat-num">${stats.totalCorrect}</div>
        <div class="stat-lbl">合計正解数</div>
      </div>
    </div>
  `;
}

function renderQuestion() {
  const q = state.questions[state.idx];
  const total = state.questions.length;
  const pct = Math.round((state.idx) / total * 100);
  const modeName = { vocab: '単語', phrase: 'フレーズ', grammar: '文法', mix: 'ミックス' }[state.mode];
  const streak = getStreak(q.id);
  const streakTag = streak > 0 ? `<span class="q-mastery-tag">連続正解 ${streak}/${MASTERY_THRESHOLD}</span>` : '';
  
  let choicesHTML = q.choices.map((c, i) => {
    let cls = 'choice';
    if (state.answered) {
      if (i === q.correct) cls += ' correct';
      else if (i === state.picked) cls += ' wrong';
      else cls += ' dim';
    }
    return `<button class="${cls}" data-pick="${i}" ${state.answered ? 'disabled' : ''}>${esc(c)}</button>`;
  }).join('');
  
  let fbHTML = '';
  if (state.answered) {
    const ok = state.picked === q.correct;
    const last = state.history[state.history.length - 1];
    let masteryNote = '';
    if (ok) {
      if (last.justMastered) {
        masteryNote = `<span class="fb-mastery">🎉 マスター達成！この問題はもう出題されません。</span>`;
      } else {
        masteryNote = `<span class="fb-mastery">連続正解 ${last.newStreak}/${MASTERY_THRESHOLD} ${last.newStreak >= 1 && last.newStreak < MASTERY_THRESHOLD ? '（あと ' + (MASTERY_THRESHOLD - last.newStreak) + ' 回でマスター）' : ''}</span>`;
      }
    } else if (last.prevStreak > 0) {
      masteryNote = `<span class="fb-mastery">連続正解はリセットされました（${last.prevStreak} → 0）</span>`;
    }
    fbHTML = `
      <div class="feedback ${ok ? 'ok' : 'ng'}">
        <div class="fb-label">${ok ? '✓ 正解！' : '✗ 残念...'}</div>
        ${esc(q.explain)}
        ${masteryNote}
      </div>
      <button class="btn btn-primary" id="nextBtn">${state.idx + 1 === total ? '結果を見る' : '次の問題へ'}</button>
    `;
  }
  
  return `
    <div class="q-head">
      <span>${modeName} · ${state.idx + 1} / ${total}</span>
      <span class="streak">🔥 ${state.score}</span>
    </div>
    <div class="q-progress"><div class="q-progress-fill" style="width: ${pct}%"></div></div>
    <p class="q-text">${esc(q.q)}${streakTag}</p>
    <p class="q-hint">4つの中から1つ選んでください</p>
    <div class="choices">${choicesHTML}</div>
    ${fbHTML}
    <button class="btn" id="homeBtn" style="margin-top: 16px;">ホームに戻る</button>
  `;
}

function renderResult() {
  const total = state.questions.length;
  const pct = Math.round(state.score / total * 100);
  const newMasters = state.history.filter(h => h.justMastered).length;
  let msg;
  if (pct === 100) msg = 'パーフェクト！すばらしい！🎉';
  else if (pct >= 80) msg = 'よくできました！もう少しで満点だね';
  else if (pct >= 60) msg = 'いい調子！間違えた問題を見直そう';
  else msg = '解説を読んでじっくり復習しよう';
  
  const reviewHTML = state.history.map(h => `
    <div class="review-item">
      <div><span class="review-mark">${h.ok ? '✓' : '✗'}</span>${esc(h.q)}${h.justMastered ? ' <span class="q-mastery-tag">マスター達成！</span>' : ''}</div>
      ${!h.ok ? `<div class="review-correct">正解: ${esc(h.correct)}</div>` : ''}
    </div>
  `).join('');
  
  const masterMsg = newMasters > 0 ? `<div class="score-msg" style="color: #C0DD97; font-weight: 600;">🏆 新たに ${newMasters} 問マスター達成！</div>` : '';
  
  return `
    <p style="text-align:center; font-size:14px; color:#a8a59c; margin:0;">結果</p>
    <div class="score-num">${state.score} / ${total}</div>
    <div class="score-msg">${msg}<br>正答率 ${pct}%</div>
    ${masterMsg}
    <div class="btn-row">
      <button class="btn btn-primary" id="retryBtn">もう一度</button>
      <button class="btn" id="homeBtn">ホームに戻る</button>
    </div>
    <div class="review">
      <div class="review-h">問題を振り返る</div>
      ${reviewHTML}
    </div>
  `;
}

function attach() {
  document.querySelectorAll('[data-mode]').forEach(b => {
    if (b.disabled) return;
    b.onclick = () => startMode(b.dataset.mode);
  });
  document.querySelectorAll('[data-pick]').forEach(b => {
    b.onclick = () => pick(parseInt(b.dataset.pick));
  });
  const nb = document.getElementById('nextBtn'); if (nb) nb.onclick = next;
  const hb = document.getElementById('homeBtn'); if (hb) hb.onclick = goHome;
  const rb = document.getElementById('retryBtn'); if (rb) rb.onclick = () => {
    const m = state.mode;
    const available = getAvailable(m);
    if (available.length === 0) { goHome(); return; }
    startMode(m);
  };
  const resetB = document.getElementById('resetBtn'); if (resetB) resetB.onclick = resetMastery;
  const syncB = document.getElementById('syncBtn'); if (syncB) syncB.onclick = openSync;
  const copyB = document.getElementById('copyBtn');
  if (copyB) copyB.onclick = () => {
    const ta = document.getElementById('exportArea');
    ta.select();
    ta.setSelectionRange(0, 99999);
    const done = () => { copyB.textContent = '✓ コピーしました！'; setTimeout(() => { copyB.textContent = '📋 コードをコピー'; }, 2000); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(ta.value).then(done).catch(() => { try { document.execCommand('copy'); done(); } catch(e){} });
    } else {
      try { document.execCommand('copy'); done(); } catch(e){}
    }
  };
  const importB = document.getElementById('importBtn');
  if (importB) importB.onclick = () => {
    const ta = document.getElementById('importArea');
    if (!ta.value.trim()) { alert('コードを貼り付けてください。'); return; }
    applySyncCode(ta.value);
  };
  const importArea = document.getElementById('importArea');
  if (importArea) {
    // 貼り付けたら自動で読み込み確認（ボタンを押さなくてもOK）
    importArea.onpaste = () => {
      setTimeout(() => { if (importArea.value.trim()) applySyncCode(importArea.value); }, 120);
    };
  }
}

loadData();
render();
</script>
